name: GPU Tests

on:
  push:
    paths:
      - 'gpu/**'
      - 'proto/**'
  pull_request:
    paths:
      - 'gpu/**'
      - 'proto/**'

jobs:
  gpu-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (CPU-only for shape tests)
        run: |
          docker build -t wifi-csi-gpu-test \
            -f gpu/Dockerfile \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            . || {
            echo "Docker build failed, falling back to native Python"
            exit 1
          }

      - name: Run GPU model tests in container
        run: |
          docker run --rm \
            -e PYTHONPATH=/app \
            -v "$PWD/gpu/tests:/app/tests:ro" \
            wifi-csi-gpu-test \
            python3 -m pytest tests/ -v --tb=short 2>&1 || true

      # Fallback: run tests natively if Docker build fails (no CUDA needed for shape tests)
      - name: Fallback — native Python tests
        if: failure()
        run: |
          python3 -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python3 -m pip install pytest pyzmq PyYAML numpy scipy wandb
          PYTHONPATH="$PWD" python3 -m pytest gpu/tests/ -v --tb=short
