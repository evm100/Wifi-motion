services:
  training:
    build:
      context: ..
      dockerfile: gpu/Dockerfile
    profiles: ["training"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./configs:/app/configs
      - ../proto:/app/proto
    command: python3 training/train.py --config configs/train_resnet.yaml

  inference:
    build:
      context: ..
      dockerfile: gpu/Dockerfile
    runtime: nvidia
    network_mode: host
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_PATH=/app/checkpoints/best_resnet.pt
      - ZMQ_ADDRESS=tcp://192.168.4.1:5556
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ../proto:/app/proto:ro
