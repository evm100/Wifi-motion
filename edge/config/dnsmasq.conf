# dnsmasq.conf — DHCP for ESP32 nodes on the Pi AP interface.
# Assign static leases to ESP32 nodes for predictable addressing.

interface=wlan0
bind-interfaces

# DHCP range: 192.168.4.10 to 192.168.4.50, 12h lease
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,12h

# Pi AP address
listen-address=192.168.4.1

# Disable DNS (not needed for CSI data path)
port=0
