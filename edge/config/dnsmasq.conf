# dnsmasq.conf — NOT USED in the current topology.
#
# The system now uses an iPhone hotspot as the AP instead of the Pi.
# DHCP is handled by the iPhone. This file is kept for reference.

interface=wlan0
bind-interfaces

# DHCP range: 192.168.4.10 to 192.168.4.50, 12h lease
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,12h

# Pi AP address
listen-address=192.168.4.1

# Disable DNS (not needed for CSI data path)
port=0
