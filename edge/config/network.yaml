# network.yaml — Network configuration for CSI edge pipeline.
#
# All devices (Pi + ESP32 nodes) connect to an iPhone hotspot as STAs.
# The Pi receives CSI packets from ESP32 RX nodes via UDP.

# UDP receiver for ESP32 CSI packets
udp_host: "0.0.0.0"
udp_port: 5005

# RX node configuration
n_nodes: 3
node_ids: [1, 2, 3]

# Aligner settings
aligner_stale_threshold: 50   # Seq numbers older than max-50 are dropped

# ZMQ GPU forwarder
gpu_address: "tcp://*:5556"   # Pi binds; GPU SUB connects
gpu_send_hwm: 100             # Max queued tensors before dropping
